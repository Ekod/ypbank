[alias]
convert_txt_to_csv = "run --bin ypbank_converter -- --input records_example.txt --input-format txt --output-format csv"
convert_txt_to_binary = "run --bin ypbank_converter -- --input records_example.txt --input-format txt --output-format bin"
convert_csv_to_txt = "run --bin ypbank_converter -- --input records_example.csv --input-format csv --output-format txt"
convert_csv_to_binary = "run --bin ypbank_converter -- --input records_example.csv --input-format csv --output-format bin"
convert_binary_to_csv = "run --bin ypbank_converter -- --input records_example.bin --input-format bin --output-format csv"
convert_binary_to_txt = "run --bin ypbank_converter -- --input records_example.bin --input-format bin --output-format txt"
#-------------------------------------------------------------------------------------------------------------------------
compare_csv_to_csv = "run --bin transaction_comparer -- --file1 records_example.csv --input-format1 csv --file2 records_example.csv --input-format2 csv"
compare_csv_to_txt = "run --bin transaction_comparer -- --file1 records_example.csv --input-format1 csv --file2 records_example.txt --input-format2 txt"
compare_csv_to_binary = "run --bin transaction_comparer -- --file1 records_example.csv --input-format1 csv --file2 records_example.bin --input-format2 bin"
compare_txt_to_txt = "run --bin transaction_comparer -- --file1 records_example.txt --input-format1 txt --file2 records_example.txt --input-format2 txt"
compare_txt_to_csv = "run --bin transaction_comparer -- --file1 records_example.txt --input-format1 txt --file2 records_example.csv --input-format2 csv"
compare_txt_to_binary = "run --bin transaction_comparer -- --file1 records_example.txt --input-format1 txt --file2 records_example.bin --input-format2 bin"
compare_binary_to_binary = "run --bin transaction_comparer -- --file1 records_example.bin --input-format1 bin --file2 records_example.bin --input-format2 bin"
compare_binary_to_txt = "run --bin transaction_comparer -- --file1 records_example.bin --input-format1 bin --file2 records_example.txt --input-format2 txt"
compare_binary_to_csv = "run --bin transaction_comparer -- --file1 records_example.bin --input-format1 bin --file2 records_example.csv --input-format2 csv"
